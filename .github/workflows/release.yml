name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for the release (e.g. v1.0.0). Required for manual runs.'
        required: true
        default: ''

env:
  FLUTTER_VERSION: '3.29.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$EVENT_INPUT_VERSION"
            if [ -z "$VERSION" ]; then
              VERSION="2026.07.22"
            fi
          else
            VERSION="$REF_NAME"
          fi
          CLEAN_VERSION=$(echo "$VERSION" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION (clean: $CLEAN_VERSION)"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare Android RELEASE signing key
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 || secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS || secrets.ANDROID_KEY_ALIAS || 'upload' }}
          KEY_PASS: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD || secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          SIGNING_DIR="${RUNNER_TEMP}/signing"
          mkdir -p "$SIGNING_DIR"
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$SIGNING_DIR/release-keystore.jks"
            chmod 600 "$SIGNING_DIR/release-keystore.jks"
            {
              echo "ANDROID_KEYSTORE_PATH=$SIGNING_DIR/release-keystore.jks"
              echo "ANDROID_KEYSTORE_PASSWORD=$KEYSTORE_PASS"
              echo "ANDROID_KEY_ALIAS=$KEY_ALIAS"
              echo "ANDROID_KEY_PASSWORD=$KEY_PASS"
            } >> $GITHUB_ENV
            echo "keystore_prepared=true" >> $GITHUB_OUTPUT
            echo "RELEASE signing key prepared from secrets."
          else
            echo "keystore_prepared=false" >> $GITHUB_OUTPUT
            echo "::warning::No release keystore secret configured — build will use debug signing."
          fi

      - name: Get Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build Android APK (release)
        working-directory: mobile
        env:
          VERSION_NAME: ${{ steps.version.outputs.clean_version }}
          BUILD_NUMBER: ${{ github.run_number }}
          ANDROID_KEYSTORE_PATH: ${{ steps.signing.outputs.keystore_prepared == 'true' && env.ANDROID_KEYSTORE_PATH || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ steps.signing.outputs.keystore_prepared == 'true' && env.ANDROID_KEYSTORE_PASSWORD || '' }}
          ANDROID_KEY_ALIAS: ${{ steps.signing.outputs.keystore_prepared == 'true' && env.ANDROID_KEY_ALIAS || '' }}
          ANDROID_KEY_PASSWORD: ${{ steps.signing.outputs.keystore_prepared == 'true' && env.ANDROID_KEY_PASSWORD || '' }}
        run: |
          set -e
          echo "Building APK versionName=$VERSION_NAME buildNumber=$BUILD_NUMBER"
          echo "Keystore: ${ANDROID_KEYSTORE_PATH:-<none>}"

          flutter build apk --release \
            --build-name "$VERSION_NAME" \
            --build-number "$BUILD_NUMBER"

          ls -lh "build/app/outputs/flutter-apk/app-release.apk" || {
            echo "::error::APK not found"
            ls -R build/app/outputs/flutter-apk || true
            exit 1
          }

      - name: Prepare APK artifact
        working-directory: mobile
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          APK_SRC="build/app/outputs/flutter-apk/app-release.apk"
          APK_DEST="../gatepassx-android-${VERSION}.apk"
          cp "$APK_SRC" "$APK_DEST"
          ls -lh "$APK_DEST"
          echo "artifact_apk=$APK_DEST" >> $GITHUB_ENV

      - name: Package Python Generator
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          PKG_DIR="gatepassx-python-generator-${VERSION}"
          mkdir -p "$PKG_DIR"
          cp -r python-generator/* "$PKG_DIR"/
          cp -r sample_data "$PKG_DIR"/ 2>/dev/null || true
          if [ -f python-generator/RELEASE_README.txt ]; then
            cp python-generator/RELEASE_README.txt "$PKG_DIR/README.txt"
          fi
          ZIP_NAME="gatepassx-python-generator-${VERSION}.zip"
          zip -r "$ZIP_NAME" "$PKG_DIR"
          ls -lh "$ZIP_NAME"
          echo "artifact_python_zip=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create and upload GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          gh release create "$VERSION" \
            --title "GatePassX $VERSION" \
            --generate-notes \
            --draft=false \
            gatepassx-android-*.apk \
            gatepassx-python-generator-*.zip

      - name: Upload build artifacts (debug)
        uses: actions/upload-artifact@v4
        with:
          name: gatepassx-builds-${{ steps.version.outputs.version }}
          path: |
            gatepassx-*.apk
            gatepassx-*.zip
          retention-days: 7