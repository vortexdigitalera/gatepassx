name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for the release (e.g. v1.0.0). Required for manual runs.'
        required: true
        default: ''

env:
  FLUTTER_VERSION: '3.22.2'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # === Determine version very early ===
      - name: Determine version
        id: version
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="2026.07.22"
            fi
          else
            VERSION="${{ github.ref_name }}"
          fi
          # Strip leading v if present for build name
          CLEAN_VERSION=$(echo "$VERSION" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION (clean: $CLEAN_VERSION)"

      # === Setup Java (required for Android builds) ===
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # === Flutter ===
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # Use dedicated Android setup action + explicit caching.
      # This is more reliable for license acceptance and avoids the "Fetch remote repository" hangs
      # that happen when flutter doctor tries to auto-update SDK.
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            /opt/hostedtoolcache/android
            /usr/local/lib/android
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-



      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/.gradle
        with:
          gradle-version: wrapper

      - name: Pre-accept SDK licenses (early hack to avoid fetch/compute hangs)
        run: |
          # Pre-write to user-writable locations before the action installs.
          # This helps the action's internal sdkmanager not complain.
          for SDK_DIR in "$HOME/Android/Sdk" "$HOME/.android"; do
            mkdir -p "$SDK_DIR/licenses" 2>/dev/null || true
            echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$SDK_DIR/licenses/android-sdk-license" || true
            echo "d56f5187479451eabf01fb78af6dfcb131a6481e" > "$SDK_DIR/licenses/android-sdk-license" || true
            echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$SDK_DIR/licenses/android-sdk-license" || true
            echo "79120722343a6f314e0719f863036c702b0e6b2a" > "$SDK_DIR/licenses/android-sdk-license" || true
            echo "33b6a2b64607f11b759f320ef9c38d4d" > "$SDK_DIR/licenses/google-gdk-license" || true
            echo "d975f751698a77b662f1254ddbeed3901e976f5a" > "$SDK_DIR/licenses/intel-android-extra-license" || true
            echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$SDK_DIR/licenses/android-sdk-preview-license" || true
          done
          echo "Licenses pre-accepted in writable locations."

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Use a recent cmdline-tools to avoid old license fetch issues
          cmdline-tools-version: '11076708'

      - name: Accept Android SDK licenses
        run: |
          # Make sure $ANDROID_HOME is set (the action should have set it)
          ANDROID_HOME=${ANDROID_HOME:-$HOME/Android/Sdk}
          export ANDROID_HOME
          echo "Using ANDROID_HOME=$ANDROID_HOME"
          # Write the license files directly to the correct location (this satisfies most checks)
          mkdir -p "$ANDROID_HOME/licenses"
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo "79120722343a6f314e0719f863036c702b0e6b2a" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          echo "33b6a2b64607f11b759f320ef9c38d4d" > "$ANDROID_HOME/licenses/google-gdk-license"
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > "$ANDROID_HOME/licenses/intel-android-extra-license"
          # Now run the acceptance commands with yes to catch any remaining
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | flutter doctor --android-licenses || true
          flutter doctor -v | cat

      # === Python ===
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # === Prepare caches (use $RUNNER_TEMP for Gradle - runner temp dir, not /tmp) ===
      - name: Prepare caches
        run: |
          export GRADLE_USER_HOME=${{ runner.temp }}/.gradle
          export PUB_CACHE=/home/runner/.pub-cache
          mkdir -p "$GRADLE_USER_HOME" "$PUB_CACHE"
          echo "Gradle cache: $GRADLE_USER_HOME"
          echo "Pub cache: $PUB_CACHE"
          df -h /tmp

      # ==================== FLUTTER ANDROID ====================
      - name: Get Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build Android APK (release)
        working-directory: mobile
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/.gradle
          PUB_CACHE: /home/runner/.pub-cache
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          set -e
          VERSION_NAME="${{ steps.version.outputs.clean_version }}"
          BUILD_NUMBER="${{ github.run_number }}"

          echo "Building APK with versionName=$VERSION_NAME buildNumber=$BUILD_NUMBER"

          flutter build apk --release \
            --build-name "$VERSION_NAME" \
            --build-number "$BUILD_NUMBER"

          # Verify the artifact was produced (standard location)
          ls -lh "build/app/outputs/flutter-apk/app-release.apk" || {
            echo "::error::APK not found at expected location"
            ls -R build/app/outputs/flutter-apk || true
            exit 1
          }

      - name: Prepare APK artifact
        working-directory: mobile
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          APK_SRC="build/app/outputs/flutter-apk/app-release.apk"
          APK_DEST="../gatepassx-android-${VERSION}.apk"

          cp "$APK_SRC" "$APK_DEST"
          ls -lh "$APK_DEST"
          echo "artifact_apk=$APK_DEST" >> $GITHUB_ENV

      # ==================== PYTHON GENERATOR ====================
      - name: Package Python Generator
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          PKG_DIR="gatepassx-python-generator-${VERSION}"
          mkdir -p "$PKG_DIR"

          # Copy the generator source
          cp -r python-generator/* "$PKG_DIR"/
          cp -r sample_data "$PKG_DIR"/ 2>/dev/null || true

          # Use the dedicated release readme (avoids heredoc issues in YAML)
          if [ -f python-generator/RELEASE_README.txt ]; then
            cp python-generator/RELEASE_README.txt "$PKG_DIR/README.txt"
          fi

          # Create zip
          ZIP_NAME="gatepassx-python-generator-${VERSION}.zip"
          zip -r "$ZIP_NAME" "$PKG_DIR"
          ls -lh "$ZIP_NAME"

          echo "artifact_python_zip=$ZIP_NAME" >> $GITHUB_ENV

      # ==================== RELEASE ====================
      - name: Create and upload GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"

          echo "Creating release for $VERSION"

          # Use gh CLI - more reliable than the action for mixed tag/dispatch
          gh release create "$VERSION" \
            --title "GatePassX $VERSION" \
            --generate-notes \
            --draft=false \
            gatepassx-android-*.apk \
            gatepassx-python-generator-*.zip

          echo "Release created and artifacts attached successfully."

      - name: Upload build artifacts (debug)
        uses: actions/upload-artifact@v4
        with:
          name: gatepassx-builds-${{ steps.version.outputs.version }}
          path: |
            gatepassx-*.apk
            gatepassx-*.zip
          retention-days: 7
