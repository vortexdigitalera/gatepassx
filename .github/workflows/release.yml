name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: ''

env:
  FLUTTER_VERSION: '3.22.2'
  # Force caches and builds into fast temp storage (GitHub runners have fast /tmp)
  GRADLE_USER_HOME: /tmp/.gradle
  PUB_CACHE: /tmp/.pub-cache
  FLUTTER_BUILD_DIR: /tmp/gatepassx-builds/flutter

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare temp cache dirs
        run: |
          mkdir -p "$GRADLE_USER_HOME" "$PUB_CACHE" "$FLUTTER_BUILD_DIR"
          echo "Using temp locations for caches and builds:"
          df -h /tmp

      # ==================== FLUTTER APK ====================
      - name: Get Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build Android APK (release)
        working-directory: mobile
        run: |
          flutter build apk --release \
            --build-dir "$FLUTTER_BUILD_DIR" \
            --build-name "$(echo ${{ github.ref_name }} | sed 's/^v//')" \
            --build-number ${{ github.run_number }}

      - name: Rename and prepare APK artifact
        run: |
          VERSION="${{ github.ref_name }}"
          # When using --build-dir, outputs land under the custom build dir
          APK_SRC="${FLUTTER_BUILD_DIR}/app/outputs/flutter-apk/app-release.apk"
          APK_DEST="gatepassx-android-${VERSION}.apk"
          cp "$APK_SRC" "$APK_DEST"
          ls -lh "$APK_DEST"

      # ==================== PYTHON GENERATOR ====================
      - name: Install Python build tools
        run: pip install --upgrade pip wheel

      - name: Package Python Generator
        run: |
          VERSION="${{ github.ref_name }}"
          PKG_DIR="gatepassx-python-generator-${VERSION}"
          mkdir -p "$PKG_DIR"

          # Copy the generator code
          cp -r python-generator/* "$PKG_DIR"/
          cp -r sample_data "$PKG_DIR"/ 2>/dev/null || true

          # Add a small launcher README
          cat > "$PKG_DIR"/README.txt << 'EOF'
GatePassX Python Generator (AHUON)

This is a standalone packaging of the gate pass PDF + QR generator.

Requirements:
  pip install -r requirements.txt

Usage:
  python -m gatepass_generator generate -i sample_data/pilgrims.csv -o passes/ --sheet

Or run the interactive tool:
  python -m gatepass_generator new-pass
EOF

          # Create zip
          ZIP_NAME="gatepassx-python-generator-${VERSION}.zip"
          zip -r "$ZIP_NAME" "$PKG_DIR"
          ls -lh "$ZIP_NAME"

      # ==================== CREATE RELEASE ====================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GatePassX ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            gatepassx-android-*.apk
            gatepassx-python-generator-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: gatepassx-builds-${{ github.ref_name }}
          path: |
            gatepassx-*.apk
            gatepassx-*.zip
          retention-days: 7
