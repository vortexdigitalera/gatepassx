name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v2026.07.22). Used for manual runs only.'
        required: false
        default: '2026.07.22'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.29.0'
  JAVA_VERSION: '17'

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      clean_version: ${{ steps.version.outputs.clean_version }}
    steps:
      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="${EVENT_INPUT_VERSION:-2026.07.22}"
          else
            VERSION="$REF_NAME"
          fi
          CLEAN_VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "clean_version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION (build-name: $CLEAN_VERSION)"

  build-android:
    name: Build Android APK
    needs: resolve-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release signing secrets
        if: github.event_name == 'push'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 || secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS || secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD || secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          [ -z "${KEYSTORE_B64:-}" ] && { echo "::error::Missing ANDROID_RELEASE_KEYSTORE_BASE64 (or ANDROID_KEYSTORE_BASE64)"; missing=1; }
          [ -z "${KEYSTORE_PASS:-}" ] && { echo "::error::Missing ANDROID_RELEASE_KEYSTORE_PASSWORD (or ANDROID_KEYSTORE_PASSWORD)"; missing=1; }
          [ -z "${KEY_ALIAS:-}" ] && { echo "::error::Missing ANDROID_RELEASE_KEY_ALIAS (or ANDROID_KEY_ALIAS)"; missing=1; }
          [ -z "${KEY_PASS:-}" ] && { echo "::error::Missing ANDROID_RELEASE_KEY_PASSWORD (or ANDROID_KEY_PASSWORD)"; missing=1; }
          if [ "$missing" -ne 0 ]; then
            echo "::error::Tagged releases require all Android signing secrets. See README.md."
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          pub-cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses

      - name: Prepare Android release signing key
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 || secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS || secrets.ANDROID_KEY_ALIAS || 'upload' }}
          KEY_PASS: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD || secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_B64:-}" ]; then
            echo "::warning::No release keystore secret configured — APK will be debug-signed."
            exit 0
          fi
          SIGNING_DIR="${RUNNER_TEMP}/signing"
          mkdir -p "$SIGNING_DIR"
          echo "$KEYSTORE_B64" | base64 -d > "$SIGNING_DIR/release-keystore.jks"
          chmod 600 "$SIGNING_DIR/release-keystore.jks"
          {
            echo "ANDROID_KEYSTORE_PATH=$SIGNING_DIR/release-keystore.jks"
            echo "ANDROID_KEYSTORE_PASSWORD=$KEYSTORE_PASS"
            echo "ANDROID_KEY_ALIAS=$KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$KEY_PASS"
          } >> "$GITHUB_ENV"
          echo "Release signing key prepared."

      - name: Build Android APK (release)
        working-directory: mobile
        env:
          VERSION_NAME: ${{ needs.resolve-version.outputs.clean_version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          echo "Building APK versionName=$VERSION_NAME buildNumber=$BUILD_NUMBER"
          echo "Keystore: ${ANDROID_KEYSTORE_PATH:-<none — debug signing>}"

          flutter build apk --release \
            --build-name "$VERSION_NAME" \
            --build-number "$BUILD_NUMBER"

          APK="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "::error::APK not found at $APK"
            ls -R build/app/outputs/flutter-apk || true
            exit 1
          fi
          ls -lh "$APK"

      - name: Stage APK artifact
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -euo pipefail
          cp "mobile/build/app/outputs/flutter-apk/app-release.apk" \
            "gatepassx-android-${VERSION}.apk"
          ls -lh "gatepassx-android-${VERSION}.apk"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ needs.resolve-version.outputs.version }}
          path: gatepassx-android-*.apk
          if-no-files-found: error
          retention-days: 7

  package-python:
    name: Package Python generator
    needs: resolve-version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package Python generator
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -euo pipefail
          PKG_DIR="gatepassx-python-generator-${VERSION}"
          mkdir -p "$PKG_DIR"
          cp -r python-generator/* "$PKG_DIR"/
          cp -r sample_data "$PKG_DIR"/ 2>/dev/null || true
          if [ -f python-generator/RELEASE_README.txt ]; then
            cp python-generator/RELEASE_README.txt "$PKG_DIR/README.txt"
          fi
          ZIP_NAME="gatepassx-python-generator-${VERSION}.zip"
          zip -qr "$ZIP_NAME" "$PKG_DIR"
          ls -lh "$ZIP_NAME"

      - name: Upload Python package
        uses: actions/upload-artifact@v4
        with:
          name: python-zip-${{ needs.resolve-version.outputs.version }}
          path: gatepassx-python-generator-*.zip
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs: [resolve-version, build-android, package-python]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ needs.resolve-version.outputs.version }}
          path: dist

      - name: Download Python package
        uses: actions/download-artifact@v4
        with:
          name: python-zip-${{ needs.resolve-version.outputs.version }}
          path: dist

      - name: List release assets
        run: ls -lh dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -euo pipefail
          ASSETS=(dist/*.apk dist/*.zip)

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION exists — uploading assets with --clobber"
            gh release upload "$VERSION" "${ASSETS[@]}" --clobber
          else
            echo "Creating release $VERSION"
            gh release create "$VERSION" \
              --title "GatePassX $VERSION" \
              --generate-notes \
              "${ASSETS[@]}"
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gatepassx-builds-${{ needs.resolve-version.outputs.version }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7