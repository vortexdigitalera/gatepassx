// Provide 'flutter' extension early so that plugins (share_plus, mobile_scanner etc.)
// can access flutter.compileSdkVersion etc. during their evaluation.
// This fixes "unknown property 'flutter'" and "compileSdkVersion not specified" errors.
ext.flutter = [
    compileSdkVersion: 36,
    minSdkVersion: 21,
    targetSdkVersion: 36,
    ndkVersion: "25.1.8937393"
]

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
